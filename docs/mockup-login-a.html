<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 mockup · 方案 A 哨卡 · 采集运维台</title>
<style>
:root {
  --bg: #1B1A17; --panel: #232119; --ink: #E8E4D8; --mute: #8F8A78; --line: #38352B;
  --ok: #7FBF8E; --ok-dim: rgba(127,191,142,.16); --bad: #D97C7C; --bad-dim: rgba(217,124,124,.16);
  --mono: "SF Mono", Menlo, Consolas, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font: 13.5px/1.5 var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.tag { position: fixed; top: 14px; right: 16px; font-size: 11px; color: var(--mute); text-align: right; line-height: 1.8; }
.gate { width: 320px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 26px 26px 22px; margin-top: -8vh; }
.brand { font-family: "Iowan Old Style", Georgia, serif; font-size: 18px; font-weight: 600; padding-bottom: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 9px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px rgba(127,191,142,.7); animation: breathe 2.6s ease-in-out infinite; }
@keyframes breathe { 50% { box-shadow: 0 0 2px rgba(127,191,142,.25); opacity: .55; } }
label { display: block; font-size: 11px; color: var(--mute); margin-bottom: 14px; letter-spacing: .06em; }
input { display: block; width: 100%; margin-top: 5px; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; background: var(--bg); color: var(--ink); font: 13px var(--mono); outline: none; }
input:focus { border-color: rgba(127,191,142,.55); box-shadow: 0 0 0 2px rgba(127,191,142,.12); }
button { width: 100%; margin-top: 6px; border: 1px solid rgba(127,191,142,.4); background: var(--ok-dim); color: var(--ok); border-radius: 6px; padding: 8px; font: 13px var(--mono); cursor: pointer; }
button:hover { border-color: var(--ok); }
button:focus-visible, input:focus-visible { outline: 2px solid rgba(127,191,142,.5); outline-offset: 1px; }
.err { display: none; margin-top: 12px; font-size: 12px; color: var(--bad); background: var(--bad-dim); border: 1px solid rgba(217,124,124,.35); border-radius: 6px; padding: 7px 10px; }
.gate.no { animation: shake .3s; }
.gate.no .err { display: block; }
@keyframes shake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
.gate.yes button { color: var(--ink); border-color: var(--ok); background: rgba(127,191,142,.3); }
.gate.yes { animation: sink .5s .25s forwards; }
@keyframes sink { to { opacity: 0; transform: translateY(-8px); } }
@media (prefers-reduced-motion: reduce) { .dot, .gate { animation: none !important; } }
@media (max-width: 380px) { .gate { width: calc(100vw - 32px); } }
</style>
</head>
<body>
<div class="tag">mockup · 方案 A 哨卡<br>演示:密码输 demo 走成功流</div>
<form class="gate" id="g">
  <div class="brand"><span class="dot"></span> 采集运维台</div>
  <label>账号<input autocomplete="username" id="u"></label>
  <label>密码<input type="password" autocomplete="current-password" id="p"></label>
  <button>进入</button>
  <p class="err">账号或密码不对</p>
</form>
<script>
document.getElementById('g').addEventListener('submit', (e) => {
  e.preventDefault();
  const g = e.currentTarget;
  g.classList.remove('no', 'yes');
  void g.offsetWidth;
  if (document.getElementById('p').value === 'demo') { g.classList.add('yes'); g.querySelector('button').textContent = '✓ 进入面板…'; }
  else g.classList.add('no');
});
</script>
</body>
</html>
